<!DOCTYPE html>
<html lang="zh-TW">
<head>

        :root { --ntnu-red: #8A1538; --bg-color: #FDFBF7; --text-main: #333333; --accent: #D4A373; --chat-emily: #E8F0FE; --chat-student: #FCE8E6; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); overflow-x: hidden; }
        #game-container { width: 100%; max-width: 600px; background: #FFF; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; min-height: 85vh; position: relative; z-index: 10; overflow: hidden;}
        #scene-area { background: linear-gradient(135deg, var(--ntnu-red), #5c0e25); height: 160px; position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 6px solid var(--accent); }
        .campus-bg { position: absolute; top: 15px; left: 20px; color: rgba(255,255,255,0.1); font-size: 55px; font-weight: bold; pointer-events: none; font-family: 'Noto Serif TC', serif; letter-spacing: 2px;}
        #avatar-container { width: 100px; height: 100px; background: #FFF; border-radius: 50%; border: 4px solid var(--accent); transform: translateY(30px); z-index: 10; background-color: #FCE8E6; display: flex; justify-content: center; align-items: center; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
        #interaction-area { padding: 45px 30px 30px 30px; flex-grow: 1; display: flex; flex-direction: column; background: #faf8f5;}
        
        .dialogue-box { background: #FFFFFF; border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 2px solid var(--ntnu-red); font-size: 1.1em; font-weight: bold; text-align: center; min-height: 50px; position: relative; line-height: 1.5; color: #444; box-shadow: 0 4px 10px rgba(138,21,56,0.05);}
        .dialogue-box::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); border-width: 0 12px 12px 12px; border-style: solid; border-color: transparent transparent var(--ntnu-red) transparent; }
        
        .step-section { display: none; animation: fadeIn 0.4s ease-out; } 
        .step-section.active { display: block; }
        
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #DDD; border-radius: 8px; font-size: 1.1em; text-align: center; box-sizing: border-box; transition: 0.2s;}
        input[type="text"]:focus { border-color: var(--ntnu-red); outline: none; }
        
        button { background: var(--ntnu-red); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 10px rgba(138,21,56,0.2);}
        button:hover:not(:disabled) { transform: translateY(-2px); background: #A32A4C;}
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none;}
        .btn-secondary { background: #FFF; color: var(--ntnu-red); border: 2px solid var(--ntnu-red); box-shadow: none;}
        .btn-secondary:hover:not(:disabled) { background: #FFF0F0; }
        
        .char-selection-block { background: #FFF; border: 2px solid #EEE; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left; }
        .radio-option { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; padding: 10px; border: 1px solid #EEE; border-radius: 8px; background: #FAFAFA; transition: 0.2s;}
        .radio-option:hover { border-color: var(--ntnu-red); background: #FFF8F8; }
        
        .drop-slot { display: inline-block; min-width: 90px; border-bottom: 2px dashed #999; text-align: center; color: var(--ntnu-red); font-weight: bold; cursor: pointer; margin: 0 5px; padding-bottom: 2px;}
        .drop-slot.filled { border-bottom: 2px solid #4CAF50; color: #4CAF50; }
        .word-card { display: inline-block; background: #FFF; border: 2px solid var(--accent); padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;}
        .word-card:hover:not(.used) { transform: scale(1.05); }
        .word-card.used { opacity: 0.3; pointer-events: none; border-color: #CCC; }
        
        .chat-container { background: #F8F9FA; border: 1px solid #E0E0E0; border-radius: 12px; padding: 15px; height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; text-align: left; scroll-behavior: smooth;}
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; clear: both; font-size: 0.95em; line-height: 1.4; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .chat-emily { background: var(--chat-emily); align-self: flex-start; color: #1A73E8; font-weight: bold; }
        .chat-student { background: var(--chat-student); align-self: flex-end; color: var(--ntnu-red); font-weight: bold; }
        .chat-btn { background: #FFF; border: 2px solid #DDD; color: #555; text-align: left; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; width: 100%; cursor: pointer; transition: 0.2s; box-shadow: none;}
        .chat-btn:hover:not(:disabled) { border-color: var(--ntnu-red); background: #FFF8F8; transform: translateX(5px); }
        
        .business-card { width: 100%; max-width: 450px; background: #FFF; border: 1px solid #E0E0E0; box-shadow: 0 8px 25px rgba(0,0,0,0.1); padding: 30px; box-sizing: border-box; position: relative; overflow: hidden; border-left: 12px solid var(--ntnu-red); min-height: 250px; text-align: left; border-radius: 8px;}
        .card-decor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        .card-content { position: relative; z-index: 5; }
        .bc-header { color: #666; font-size: 0.8em; margin-bottom: 15px; border-bottom: 1px solid #EEE; padding-bottom: 10px; font-family: 'Noto Serif TC', serif; letter-spacing: 1px;}
        .bc-name-chinese { font-size: 2.8em; font-weight: bold; color: var(--text-main); margin-bottom: 10px; font-family: 'Noto Serif TC', serif; letter-spacing: 3px;}
        .bc-meaning-tag { display: inline-block; background: var(--ntnu-red); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.85em; font-weight: bold; }
        .seal-container { position: absolute; bottom: 20px; right: 25px; width: 80px; height: 80px; z-index: 10; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

<div id="game-container">
    <div id="scene-area"><div class="campus-bg">NTNU</div><div id="avatar-container">
        <svg viewBox="0 0 100 100" style="width:100%;height:100%;"><path d="M20 100 C20 70, 80 70, 80 100" fill="#8A1538" /><path d="M25 40 C15 60, 20 90, 25 100 L75 100 C80 90, 85 60, 75 40 Z" fill="#2C3E50" /><circle cx="50" cy="45" r="20" fill="#FFE0BD" /><circle cx="42" cy="45" r="2" fill="#333" /><circle cx="58" cy="45" r="2" fill="#333" /><path d="M46 52 Q50 57 54 52" stroke="#333" stroke-width="2" fill="none" /><circle cx="37" cy="49" r="3" fill="#FFB6C1" /><circle cx="63" cy="49" r="3" fill="#FFB6C1" /><path d="M70 35 C75 30, 80 35, 75 40 C80 45, 75 50, 70 45 C65 50, 60 45, 65 40 C60 35, 65 30, 70 35 Z" fill="#F1C40F" /></svg>
    </div></div>
    
    <div id="interaction-area">
        <div class="dialogue-box" id="msg-box">歡迎來到師大華語學園！</div>
        
        <div id="step-0" class="step-section active">
            <h2 style="text-align:center; color:var(--ntnu-red);">華語文新生報到</h2>
            <button onclick="Core.startGame()">開始報到 Start</button>
        </div>
        
        <div id="step-1" class="step-section">
            <label style="font-weight:bold; color:#555;">本國名字 (Your Name)：</label>
            <input type="text" id="fn-in" placeholder="e.g. Emily">
            <button onclick="Core.toS2()">下一步 Next</button>
        </div>
        
        <div id="step-2" class="step-section">
            <button class="btn-secondary" onclick="window.open('https://translate.google.com/?sl=auto&tl=zh-TW','_blank')">🔍 Google 翻譯聽發音</button>
            <p style="font-weight:bold; color:#555; margin-top:20px;">貼上查到的中文名字：</p>
            <input type="text" id="gn-in" placeholder="e.g. 艾蜜莉">
            <button onclick="Core.toS3()">下一步 Next</button>
        </div>
        
        <div id="step-3" class="step-section">
            <div id="choice-area"></div>
            <button onclick="Core.toS4()">確認名字 Confirm</button>
        </div>
        
        <div id="step-4" class="step-section">
            <div style="text-align:left; font-size:1.1em; line-height:2;">
                <p>你好，我叫 <span id="slot-f" class="drop-slot" onclick="Core.selSlot('f')">[填空]</span>。</p>
                <p>我的中文名字是 <span id="slot-c" class="drop-slot" onclick="Core.selSlot('c')">[填空]</span>。</p>
                <p>意思是 <span id="slot-m" class="drop-slot" onclick="Core.selSlot('m')">[填空]</span>。</p>
            </div>
            <div id="card-pool" style="margin-top:20px; text-align:center;"></div>
        </div>
        
        <div id="step-5" class="step-section">
            <div class="chat-container" id="chat-history"></div>
            <div id="chat-opts-area"></div>
        </div>
        
        <div id="step-6" class="step-section">
            <div id="card-wrap" class="business-card">
                <div class="card-decor" id="bc-decor"></div>
                <div class="card-content">
                    <div class="bc-header">National Taiwan Normal University<br>國立台灣師範大學</div>
                    <div id="bc-f" style="font-size:1.2em; color:#666; margin-bottom:5px; font-weight:bold;"></div>
                    <div id="bc-c" class="bc-name-chinese"></div>
                    <div id="bc-m" class="bc-meaning-tag"></div>
                </div>
                <div class="seal-container"><canvas id="seal-canvas" width="320" height="320" style="width:100%;height:100%;"></canvas></div>
            </div>
            <button style="background:#27AE60" onclick="Core.downloadCard()">📥 下載名片 Download</button>
            <button class="btn-secondary" onclick="Core.replayEnd()">🔊 再聽一次名片</button>
        </div>
    </div>
</div>

    availableOpts: [],
    curSlot: "",
    matchedCount: 0,
    currentUtterance: null,
    fallbackTimer: null,

    show: function(stepNum) {
        document.querySelectorAll('.step-section').forEach(s => s.classList.remove('active'));
        document.getElementById('step-' + stepNum).classList.add('active');
    },

    speak: function(text, callback = null) {
        if('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            clearTimeout(this.fallbackTimer);
            
            setTimeout(() => {
                this.currentUtterance = new SpeechSynthesisUtterance(text.replace(/👩🏻‍🏫 Emily 老師: /g,''));
                this.currentUtterance.lang = 'zh-TW'; 
                this.currentUtterance.rate = 0.85;
                
                if(callback) {
                    let called = false;
                    let safeCb = () => { if(!called) { called=true; callback(); } };
                    this.currentUtterance.onend = safeCb;
                    this.currentUtterance.onerror = safeCb;
                    this.fallbackTimer = setTimeout(safeCb, (text.length * 350) + 1500); 
                }
                window.speechSynthesis.speak(this.currentUtterance);
            }, 50);
        } else {
            if(callback) setTimeout(callback, 1500);
        }
    },

    startGame: function() {
        this.show(1);
        document.getElementById("msg-box").innerText = "很高興認識你！請問你的本國名字是什麼？";
        this.speak("你好！我是 Emily 老師。很高興認識你，請告訴我你的本國名字是什麼？");
    },

    toS2: function() {
        this.data.f = document.getElementById('fn-in').value.trim();
        if(this.data.f) {
            this.show(2);
            document.getElementById("msg-box").innerText = "太好了！請查出並貼上你的中文名字。";
            this.speak("太好了，請貼上翻譯後的中文名字貼給我吧！");
        }
    },

    toS3: function() {
        this.data.g = document.getElementById('gn-in').value.trim();
        if(!this.data.g) return;
        
        const area = document.getElementById('choice-area');
        area.innerHTML = "";
        
        for(let i=0; i<this.data.g.length; i++) {
            let char = this.data.g[i];
            let meaning = "Chinese Character"; // 極少數未建檔字的最後防線
            let ops = [];

            if(Dict[char]) {
                meaning = Dict[char].m;
                ops = Dict[char].ops;
            } else {
                let shuffledDecoys = [...Decoys].filter(d => d.c !== char).sort(() => Math.random() - 0.5);
                ops = [shuffledDecoys[0], shuffledDecoys[1]];
            }
            
            let finalOptions = [
                { c: char, m: meaning, isCorrect: true },
                { c: ops[0].c, m: ops[0].m, isCorrect: false },
                { c: ops[1].c, m: ops[1].m, isCorrect: false }
            ].sort(() => Math.random() - 0.5);
            
            let htmlStr = `<div class="char-selection-block"><div style="color:var(--ntnu-red); font-weight:bold; margin-bottom:8px;">字 ${i+1}：【${char}】</div>`;
            finalOptions.forEach(opt => {
                let checkAttr = opt.isCorrect ? "checked" : "";
                htmlStr += `
                    <label class="radio-option" onclick="Core.speak('${opt.c}')">
                        <input type="radio" name="char${i}" value="${opt.c}" data-m="${opt.m}" ${checkAttr}> 
                        <b>${opt.c}</b> (${opt.m}) <div style="font-size:1.2em">🔊</div>
                    </label>`;
            });
            htmlStr += `</div>`;
            area.innerHTML += htmlStr;
        }
        this.show(3);
        document.getElementById("msg-box").innerText = "聽聽看發音，挑選最正確的組合！";
        this.speak("針對每一個字，聽聽看發音，挑選最正確的組合！");
    },

    toS4: function() {
        let nameStr = "", meaningArr = [];
        for(let i=0; i<this.data.g.length; i++){
            let r = document.querySelector(`input[name="char${i}"]:checked`);
            nameStr += r.value;
            meaningArr.push(r.getAttribute('data-m'));
        }
        this.data.c = nameStr;
        this.data.m = meaningArr.join(", ");
        
        this.sentences = [
            "你好，我叫 " + this.data.f, 
            "我的中文名字是 " + this.data.c, 
            "它的意思是 " + this.data.m
        ];
        
        const pool = document.getElementById('card-pool');
        pool.innerHTML = "";
        
        let cards = [ {id:'f', t:this.data.f}, {id:'c', t:this.data.c}, {id:'m', t:this.data.m} ];
        cards.sort(() => Math.random() - 0.5).forEach(obj => {
            let btn = document.createElement('div');
            btn.className = "word-card"; btn.innerText = obj.t;
            btn.onclick = () => {
                if(!this.curSlot) return;
                this.speak(obj.t);
                if(obj.id === this.curSlot) {
                    document.getElementById('slot-'+this.curSlot).innerText = obj.t;
                    document.getElementById('slot-'+this.curSlot).classList.add('filled');
                    btn.classList.add('used');
                    this.curSlot = ""; this.matchedCount++;
                    if(this.matchedCount === 3) setTimeout(() => this.startChat(), 1500);
                } else {
                    this.speak("不對喔，再試一次");
                }
            };
            pool.appendChild(btn);
        });
        
        this.show(4);
        document.getElementById("msg-box").innerText = "請點擊空格，再點選字卡進行配對。";
        this.speak("請點擊空格，再點選下方的字卡進行配對。");
    },

    selSlot: function(type) {
        this.curSlot = type;
        document.querySelectorAll('.drop-slot').forEach(s => s.style.background = "transparent");
        document.getElementById('slot-'+type).style.background = "#FFF0F0";
    },

    startChat: function() {
        this.show(5);
        document.getElementById("msg-box").innerText = "最後一關：跟老師對話！";
        this.chatStage = 0;
        this.availableOpts = [0, 1, 2];
        this.renderChatTurn();
    },

    renderChatTurn: function() {
        const box = document.getElementById('chat-history');
        const optsArea = document.getElementById('chat-opts-area');
        optsArea.innerHTML = "";
        
        let teacherText = "";
        if(this.chatStage === 0) teacherText = "你好！很高興認識你。";
        else if(this.chatStage === 1) teacherText = "你的中文名字是什麼？";
        else if(this.chatStage === 2) teacherText = "這名字真好聽！它的意思是什麼？";
        
        if(this.chatStage < 3) {
            box.innerHTML += `<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: ${teacherText}</div>`;
            box.scrollTop = box.scrollHeight;
            this.speak(teacherText);
            
            let shuffled = [...this.availableOpts].sort(() => Math.random() - 0.5);
            shuffled.forEach(idx => {
                let btn = document.createElement('button');
                btn.className = "chat-btn";
                btn.innerHTML = `<span>${this.sentences[idx]}</span> 🔊`;
                btn.onclick = () => {
                    document.querySelectorAll('.chat-btn').forEach(b => b.disabled = true);
                    
                    if(idx === this.chatStage) {
                        box.innerHTML += `<div class="chat-bubble chat-student">${this.sentences[idx]}</div>`;
                        box.scrollTop = box.scrollHeight;
                        this.availableOpts = this.availableOpts.filter(o => o !== idx);
                        this.chatStage++;
                        this.speak(this.sentences[idx], () => this.renderChatTurn());
                    } else {
                        btn.style.borderColor = "red";
                        setTimeout(() => btn.style.borderColor = "#DDD", 500);
                        this.speak(this.sentences[idx], () => {
                            document.querySelectorAll('.chat-btn').forEach(b => b.disabled = false);
                        });
                    }
                };
                optsArea.appendChild(btn);
            });
        } else {
            box.innerHTML += `<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 太棒了！任務大成功！</div>`;
            box.scrollTop = box.scrollHeight;
            this.speak("太棒了！你的中文真的非常好喔！任務大成功！", () => this.triggerEnd());
        }
    },

    triggerEnd: function() {
        new Audio('https://actions.google.com/sounds/v1/weapons/fireworks_with_whistle.ogg').play().catch(e=>{});
        this.show(6);
        document.getElementById("msg-box").innerText = "報到完成！這是你的專屬名片。";
        
        document.getElementById('bc-f').innerText = this.data.f;
        document.getElementById('bc-c').innerText = this.data.c;
        document.getElementById('bc-m').innerText = this.data.m;
        
        this.drawSeal();
        this.startFW();
        this.genDecor();
        
        setTimeout(() => this.replayEnd(), 500);
    },
