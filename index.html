<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>師大華語學園 - 新生報到</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --ntnu-red: #8A1538; --bg-color: #FDFBF7; --text-main: #333333; --accent: #D4A373; --chat-emily: #E8F0FE; --chat-student: #FCE8E6; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { width: 100%; max-width: 600px; background: #FFF; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; min-height: 85vh; overflow: hidden; position: relative;}
        #scene-area { background: var(--ntnu-red); height: 160px; position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 6px solid var(--accent); }
        #avatar-container { width: 100px; height: 100px; background: #FFF; border-radius: 50%; border: 4px solid var(--accent); transform: translateY(35px); overflow: hidden; background-color: #FCE8E6; z-index: 5;}
        #interaction-area { padding: 50px 25px 25px 25px; flex-grow: 1; text-align: center; }
        .dialogue-box { background: #FFFFFF; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 2px solid var(--ntnu-red); font-weight: bold; min-height: 50px; line-height: 1.5;}
        .step-section { display: none; } .step-section.active { display: block; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #DDD; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 1.1em;}
        button { background: var(--ntnu-red); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-secondary { background: #FFF; color: var(--ntnu-red); border: 2px solid var(--ntnu-red); }
        .char-selection-block { background: #F9F9F9; border: 1px solid #EEE; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .radio-option { display: flex; justify-content: space-between; align-items: center; background: #FFF; padding: 10px; border: 1px solid #DDD; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .speaker-icon { font-size: 1.2em; border-radius: 50%; width: 35px; height: 35px; background: #eee; display: flex; align-items: center; justify-content: center; }
        .drop-slot { display: inline-block; min-width: 110px; border-bottom: 2px dashed #999; text-align: center; color: var(--ntnu-red); font-weight: bold; cursor: pointer; margin: 0 5px; }
        .word-card { display: inline-block; padding: 10px 15px; background: #eee; border: 1px solid #ccc; border-radius: 8px; margin: 5px; cursor: pointer; font-weight: bold; }
        .word-card.used { opacity: 0.2; pointer-events: none; }
        .chat-container { background: #F0F0F0; height: 220px; overflow-y: auto; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        .chat-bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 80%; display: inline-block; clear: both; }
        .chat-emily { background: var(--chat-emily); float: left; } .chat-student { background: var(--chat-student); float: right; color: var(--ntnu-red); }
        .business-card { border: 1px solid #ddd; padding: 25px; border-left: 12px solid var(--ntnu-red); text-align: left; position: relative; background: #fff; }
        .seal { position: absolute; bottom: 15px; right: 15px; width: 70px; height: 70px; border: 3px double #C1121F; color: #C1121F; display: flex; align-items: center; justify-content: center; font-size: 35px; font-family: 'Long Cang', cursive; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="scene-area"><div id="avatar-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;"><path d="M20 100 C20 70, 80 70, 80 100" fill="#8A1538"/><path d="M25 40 C15 60, 20 90, 25 100 L75 100 C80 90, 85 60, 75 40 Z" fill="#2C3E50"/><circle cx="50" cy="45" r="20" fill="#FFE0BD"/><circle cx="42" cy="45" r="2" fill="#333"/><circle cx="58" cy="45" r="2" fill="#333"/><path d="M46 52 Q50 56 54 52" stroke="#333" stroke-width="2" fill="none"/><circle cx="37" cy="49" r="3" fill="#FFB6C1" opacity="0.8"/><circle cx="63" cy="49" r="3" fill="#FFB6C1" opacity="0.8"/><path d="M70 35 C75 30, 80 35, 75 40 C80 45, 75 50, 70 45 C65 50, 60 45, 65 40 C60 35, 65 30, 70 35 Z" fill="#F1C40F"/></svg>
    </div></div>
    <div id="interaction-area">
        <div class="dialogue-box" id="msg">歡迎來到師大華語學園！</div>
        <div id="s0" class="step-section active"><h2>華語文新生報到</h2><button onclick="go(1)">開始報到 Start</button></div>
        <div id="s1" class="step-section"><label>本國名字 Your Name：</label><input type="text" id="fn-in" placeholder="Emily"><button onclick="toS2()">下一步 Next</button></div>
        <div id="s2" class="step-section"><button class="btn-secondary" onclick="window.open('https://translate.google.com/?sl=auto&tl=zh-TW','_blank')">🔍 Google 翻譯聽發音</button><p>貼上翻譯後的中文名字：</p><input type="text" id="gn-in" placeholder="艾蜜莉"><button onclick="toS3()">下一步 Next</button></div>
        <div id="s3" class="step-section"><div id="suggest-area"></div><button onclick="toS4()">確認名字 Confirm</button></div>
        <div id="s4" class="step-section"><div style="text-align:left"><p>你好，我叫 <span id="sl-f" class="drop-slot" onclick="selSlot('f')">[點擊填空]</span>。</p><p>我的中文名字是 <span id="sl-c" class="drop-slot" onclick="selSlot('c')">[點擊填空]</span>。</p><p>它的意思是 <span id="sl-m" class="drop-slot" onclick="selSlot('m')">[點擊填空]</span>。</p></div><div id="card-pool"></div></div>
        <div id="s5" class="step-section"><div class="chat-container" id="chat-box"></div><div id="chat-opts"></div><button id="final-btn" style="display:none;background:#F39C12" onclick="goEnd()">🎆 領取我的名片 🎆</button></div>
        <div id="s6" class="step-section"><div id="card-wrap" class="business-card"><p style="font-size:0.8em;color:#666;margin:0;">National Taiwan Normal University<br>國立台灣師範大學</p><h3 id="bc-f" style="margin:10px 0 5px 0;"></h3><h2 id="bc-c" style="margin:0 0 10px 0;font-size:2.5em;"></h2><span id="bc-m" style="background:var(--ntnu-red);color:#fff;padding:3px 8px;border-radius:5px;font-size:0.9em"></span><div class="seal" id="bc-seal">印</div></div><button style="background:#27AE60" onclick="download()">📥 下載名片 Download</button><button class="btn-secondary" onclick="replay()">🔊 聽老師唸名片</button></div>
    </div>
</div>
<script>
    const pMap={'艾':[{c:'愛',m:'Love'},{c:'安',m:'Peace'}],'蜜':[{c:'米',m:'Rice'},{c:'明',m:'Bright'}],'莉':[{c:'麗',m:'Beautiful'},{c:'立',m:'Stand'}],'大':[{c:'達',m:'Reach'},{c:'德',m:'Virtue'}],'衛':[{c:'偉',m:'Great'},{c:'威',m:'Power'}],'瑪':[{c:'滿',m:'Full'},{c:'美',m:'Fine'}],'麗':[{c:'理',m:'Reason'},{c:'莉',m:'Jasmine'}],'傑':[{c:'捷',m:'Victory'},{c:'界',m:'World'}]};
    const oDict={'艾':{m:'Mugwort'},'蜜':{m:'Honey'},'莉':{m:'Jasmine'},'大':{m:'Big'},'衛':{m:'Guard'},'瑪':{m:'Agate'},'麗':{m:'Beautiful'},'傑':{m:'Outstanding'}};
    let data={f:"",g:"",c:"",m:""}, sentences=[], curSl="", okC=0, chatStage=0;
    function say(t){if('speechSynthesis'in window){window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='zh-TW';u.rate=0.85;window.speechSynthesis.speak(u);}}
    function go(n){document.querySelectorAll('.step-section').forEach(s=>s.classList.remove('active'));document.getElementById('s'+n).classList.add('active');}
    function toS2(){data.f=document.getElementById('fn-in').value.trim();if(data.f){go(1);go(2);document.getElementById('msg').innerText="太好了！請貼上中文名字。";say("太好了！請貼上中文名字");}}
    function toS3(){
        data.g=document.getElementById('gn-in').value.trim();if(!data.g)return;
        let area=document.getElementById('suggest-area'); area.innerHTML="";
        for(let i=0;i<data.g.length;i++){
            let c=data.g[i], ops=pMap[c]||[{c:'佳',m:'Excellent'},{c:'明',m:'Bright'}], orig=oDict[c]||{m:'Sound'};
            area.innerHTML+=`<div class="char-selection-block"><b>字 ${i+1}：${c}</b>
                <div class="radio-option" onclick="say('${c}')"><input type="radio" name="r${i}" value="${c}" data-m="${orig.m}" checked> <span>${c} (${orig.m})</span><div class="speaker-icon">🔊</div></div>
                <div class="radio-option" onclick="say('${ops[0].c}')"><input type="radio" name="r${i}" value="${ops[0].c}" data-m="${ops[0].m}"> <span>${ops[0].c} (${ops[0].m})</span><div class="speaker-icon">🔊</div></div>
                <div class="radio-option" onclick="say('${ops[1].c}')"><input type="radio" name="r${i}" value="${ops[1].c}" data-m="${ops[1].m}"> <span>${ops[1].c} (${ops[1].m})</span><div class="speaker-icon">🔊</div></div></div>`;
        }
        go(3);document.getElementById('msg').innerText="挑選妳喜歡的字義吧！";say("挑選妳喜歡的字義吧");
    }
    function toS4(){
        let n="",m=[];for(let i=0;i<data.g.length;i++){let r=document.querySelector(`input[name="r${i}"]:checked`);n+=r.value;m.push(r.getAttribute('data-m'));}
        data.c=n; data.m=m.join(", "); sentences=[data.f, data.c, data.m];
        let pool=document.getElementById('card-pool');pool.innerHTML="";
        [{id:'f',t:data.f},{id:'c',t:data.c},{id:'m',t:data.m}].sort(()=>Math.random()-0.5).forEach(o=>{
            let b=document.createElement('div');b.className="word-card";b.innerText=o.t;
            b.onclick=()=>{if(!curSl)return;say(o.t);if(o.id===curSl){document.getElementById('sl-'+curSl).innerText=o.t;b.classList.add('used');curSl="";okC++;if(okC===3)setTimeout(startChat,1000);}else{say("不對喔");}};
            pool.appendChild(b);
        });
        go(4);document.getElementById('msg').innerText="請點擊空格再點選字卡。";say("請完成填空配對");
    }
    function selSlot(t){curSl=t;document.querySelectorAll('.drop-slot').forEach(s=>s.style.background="#FFF0F0");}
    function startChat(){go(5);chatStage=0;nextChat();document.getElementById('msg').innerText="跟 Emily 老師對話吧！";}
    function nextChat(){
        let box=document.getElementById('chat-box');let opts=document.getElementById('chat-opts');opts.innerHTML="";
        if(chatStage===0){box.innerHTML=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 你好！很高興認識你。</div>`;say("你好！很高興認識你");showOpts(0);}
        else if(chatStage===1){box.innerHTML+=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 你的中文名字是什麼？</div>`;say("你的中文名字是什麼？");showOpts(1);}
        else if(chatStage===2){box.innerHTML+=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 它的意思是什麼？</div>`;say("它的意思是什麼？");showOpts(2);}
        else{box.innerHTML+=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 太棒了！你的中文很好喔！</div>`;say("太棒了！你的中文很好喔");document.getElementById('final-btn').style.display="block";}
    }
    function showOpts(idx){
        [0,1,2].forEach(i=>{let b=document.createElement('button');b.innerText=idx==0?"你好，我叫 "+sentences[0]:(idx==1?"我的中文名字是 "+sentences[1]:"它的意思是 "+sentences[2]);if(i==idx){b.onclick=()=>{document.getElementById('chat-box').innerHTML+=`<div class="chat-bubble chat-student">${b.innerText}</div>`;chatStage++;setTimeout(nextChat,800);};}else{b.style.display="none";}document.getElementById('chat-opts').appendChild(b);});
    }
    function goEnd(){
        go(6);document.getElementById('bc-f').innerText=data.f;document.getElementById('bc-c').innerText=data.c;document.getElementById('bc-m').innerText=data.m;document.getElementById('bc-seal').innerText=data.c[0];
        document.getElementById('msg').innerText="任務大成功！這是妳的名片。";replay();
    }
    function replay(){say(`你好，我叫${data.f}。我的中文名字是${data.c}。它的意思是${data.m}。`);}
    function download(){html2canvas(document.getElementById('card-wrap')).then(c=>{let l=document.createElement('a');l.download='MyNameCard.png';l.href=c.toDataURL();l.click();});}
    function startGame(){go(1);say("你好！我是 Emily 老師。很高興認識你，請告訴我你的本國名字是什麼？");}
</script>
</body>
</html>
