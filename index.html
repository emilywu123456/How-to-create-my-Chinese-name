<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>師大華語學園 - 新生報到</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --ntnu-red: #8A1538; --bg-color: #FDFBF7; --text-main: #333333; --accent: #D4A373; --chat-emily: #E8F0FE; --chat-student: #FCE8E6; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); overflow-x: hidden; }
        #game-container { width: 100%; max-width: 600px; background: #FFF; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; min-height: 85vh; position: relative; z-index: 10; overflow: hidden;}
        #scene-area { background: linear-gradient(135deg, var(--ntnu-red), #5c0e25); height: 180px; position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 6px solid var(--accent); }
        .campus-bg { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.1); font-size: 65px; font-weight: bold; pointer-events: none; }
        #avatar-container { width: 110px; height: 110px; background: #FFF; border-radius: 50%; border: 5px solid var(--accent); display: flex; justify-content: center; align-items: center; transform: translateY(40px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); z-index: 10; background-color: #FCE8E6; }
        #interaction-area { padding: 60px 30px 30px 30px; flex-grow: 1; display: flex; flex-direction: column; background: #faf8f5;}
        .dialogue-box { background: #FFFFFF; border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 2px solid var(--ntnu-red); font-size: 1.1em; font-weight: bold; text-align: center; min-height: 60px; line-height: 1.6; position: relative;}
        .dialogue-box::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); border-width: 0 12px 12px 12px; border-style: solid; border-color: transparent transparent var(--ntnu-red) transparent; }
        .step-section { display: none; } .step-section.active { display: block; animation: fadeIn 0.5s; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #DDD; border-radius: 8px; font-size: 1.1em; box-sizing: border-box; text-align: center;}
        button { background: var(--ntnu-red); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        button:hover { background: #A32A4C; transform: translateY(-2px); } .btn-secondary { background: #FFF; color: var(--ntnu-red); border: 2px solid var(--ntnu-red); }
        .char-selection-block { background: #FFF; border: 2px solid #EEE; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left; }
        .radio-option { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; padding: 10px; border-radius: 8px; border: 1px solid #EEE; background: #FAFAFA; transition: 0.2s;}
        .speaker-icon { font-size: 1.2em; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: #FFF; border: 1px solid #DDD; }
        .drop-slot { display: inline-block; min-width: 120px; border-bottom: 2px dashed #999; text-align: center; color: var(--ntnu-red); font-weight: bold; cursor: pointer; padding: 0 5px;}
        .drop-slot.filled { border-bottom: 2px solid #4CAF50; color: #4CAF50; }
        .word-card { display: inline-block; background: #FFF; border: 2px solid var(--accent); padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .word-card.used { opacity: 0.3; pointer-events: none; }
        .chat-container { background: #F8F9FA; border: 1px solid #E0E0E0; border-radius: 12px; padding: 15px; height: 230px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; text-align: left;}
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 1em; line-height: 1.4; clear: both; }
        .chat-emily { background: var(--chat-emily); align-self: flex-start; color: #1A73E8; font-weight: bold; }
        .chat-student { background: var(--chat-student); align-self: flex-end; color: var(--ntnu-red); font-weight: bold; float: right; margin-bottom: 8px;}
        .chat-btn { background: #FFF; border: 2px solid #DDD; color: #555; text-align: left; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; width: 100%; cursor: pointer;}
        .business-card { width: 100%; max-width: 450px; background: #FFF; border: 1px solid #E0E0E0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; box-sizing: border-box; position: relative; overflow: hidden; border-left: 12px solid var(--ntnu-red); min-height: 250px; text-align: left;}
        .card-decoration-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        .card-content-layer { position: relative; z-index: 5; }
        .bc-header { color: #666; font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid #EEE; padding-bottom: 10px; line-height: 1.6; font-family: serif; }
        .bc-name-chinese { font-size: 2.8em; font-weight: bold; color: var(--text-main); margin-bottom: 15px; font-family: serif; }
        .bc-meaning-tag { display: inline-block; background: var(--ntnu-red); color: white; padding: 5px 12px; border-radius: 6px; font-size: 0.85em; font-weight: bold; }
        .seal-container { position: absolute; bottom: 25px; right: 30px; width: 85px; height: 85px; z-index: 10; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="game-container">
    <div id="scene-area"><div class="campus-bg">NTNU</div><div id="avatar-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;"><path d="M20 100 C20 70, 80 70, 80 100" fill="#8A1538" /><path d="M25 40 C15 60, 20 90, 25 100 L75 100 C80 90, 85 60, 75 40 Z" fill="#2C3E50" /><circle cx="50" cy="45" r="20" fill="#FFE0BD" /><circle cx="42" cy="45" r="2.5" fill="#333" /><circle cx="58" cy="45" r="2.5" fill="#333" /><path d="M46 52 Q50 57 54 52" stroke="#333" stroke-width="2" fill="none" /><circle cx="37" cy="49" r="3" fill="#FFB6C1" /><circle cx="63" cy="49" r="3" fill="#FFB6C1" /><path d="M70 35 C75 30, 80 35, 75 40 C80 45, 75 50, 70 45 C65 50, 60 45, 65 40 C60 35, 65 30, 70 35 Z" fill="#F1C40F" /></svg>
    </div></div>
    <div id="interaction-area">
        <div class="dialogue-box" id="dialogue-text">歡迎來到師大華語學園！</div>
        <div id="step-0" class="step-section active"><h2>華語文新生報到</h2><button onclick="startGame()">開始報到 Start</button></div>
        <div id="step-1" class="step-section"><label>本國名字 Your Name：</label><input type="text" id="fn-input" placeholder="e.g. Emily"><button onclick="toS2()">下一步 Next</button></div>
        <div id="step-2" class="step-section"><button class="btn-secondary" onclick="window.open('https://translate.google.com/?sl=auto&tl=zh-TW','_blank')">🔍 Google 翻譯聽發音</button><p>貼上翻譯後的中文名字：</p><input type="text" id="gn-input" placeholder="e.g. 艾蜜莉"><button onclick="toS3()">下一步 Next</button></div>
        <div id="step-3" class="step-section"><div id="choice-area"></div><button onclick="toS4()">確認名字 Confirm</button></div>
        <div id="step-4" class="step-section"><div style="text-align:left"><p>你好，我叫 <span id="slot-f" class="drop-slot" onclick="selSlot('f')">[點擊填空]</span>。</p><p>我的中文名字是 <span id="slot-c" class="drop-slot" onclick="selSlot('c')">[點擊填空]</span>。</p><p>它的意思是 <span id="slot-m" class="drop-slot" onclick="selSlot('m')">[點擊填空]</span>。</p></div><div id="card-pool"></div></div>
        <div id="step-5" class="step-section"><div class="chat-container" id="chat-box"></div><div id="chat-opts"></div></div>
        <div id="step-6" class="step-section">
            <div id="card-wrap" class="business-card">
                <div class="card-decoration-layer" id="bc-decorations"></div>
                <div class="card-content-layer">
                    <div class="bc-header">National Taiwan Normal University<br>國立台灣師範大學</div>
                    <div id="bc-f" style="font-size:1.3em;color:#555;margin-bottom:5px;"></div>
                    <div id="bc-c" class="bc-name-chinese"></div>
                    <div id="bc-m" class="bc-meaning-tag"></div>
                </div>
                <div class="seal-container"><canvas id="seal-canvas" width="320" height="320" style="width:85px;height:85px;"></canvas></div>
            </div>
            <button style="background:#27AE60" onclick="download()">📥 下載名片 Download</button>
            <button class="btn-secondary" onclick="replaySpeech()">🔊 聽老師唸名片</button>
        </div>
    </div>
</div>
<script>
    const pMap={'艾':[{c:'愛',m:'Love'},{c:'安',m:'Peace'}],'蜜':[{c:'米',m:'Rice'},{c:'明',m:'Bright'}],'莉':[{c:'麗',m:'Beautiful'},{c:'立',m:'Stand'}],'大':[{c:'達',m:'Reach'},{c:'德',m:'Virtue'}],'衛':[{c:'偉',m:'Great'},{c:'威',m:'Power'}],'瑪':[{c:'滿',m:'Full'},{c:'美',m:'Fine'}],'麗':[{c:'理',m:'Reason'},{c:'莉',m:'Jasmine'}],'傑':[{c:'捷',m:'Victory'},{c:'界',m:'World'}]};
    const oDict={'艾':{m:'Mugwort'},'蜜':{m:'Honey'},'莉':{m:'Jasmine'},'大':{m:'Big'},'衛':{m:'Guard'},'瑪':{m:'Agate'},'麗':{m:'Beautiful'}};
    let data={f:"",g:"",c:"",m:""}, curSl="", okC=0, sentences=[], chatStage=0, typeTimer;

    function speak(t, r=0.85){if('speechSynthesis'in window){window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t.replace(/👩🏻‍🏫 Emily 老師: /g,''));u.lang='zh-TW';u.rate=r;window.speechSynthesis.speak(u);}}
    function type(t){clearTimeout(typeTimer); let el=document.getElementById("dialogue-text"); el.innerText=""; let i=0; function run(){if(i<t.length){el.innerText+=t.charAt(i);i++;typeTimer=setTimeout(run,40);}} run();}
    function show(n){document.querySelectorAll('.step-section').forEach(s=>s.classList.remove('active'));document.getElementById('step-'+n).classList.add('active');}
    
    // ✨ 修正：從點擊按鈕啟動第一聲，解鎖瀏覽器限制 ✨
    function startGame(){show(1);type("你好！我是 Emily 老師。很高興認識你，請告訴我你的本國名字是什麼？");speak("你好！我是 Emily 老師。很高興認識你，請告訴我你的本國名字是什麼？");}
    function toS2(){data.f=document.getElementById('fn-input').value.trim();if(!data.f)return;show(2);type(`太好了，${data.f}！請貼上翻譯後的中文名字貼給我吧！`);speak(`太好了，${data.f}！去 Google 翻譯聽聽發音，把查到的中文名字貼給我吧！`);}
    function toS3(){
        data.g=document.getElementById('gn-input').value.trim();if(!data.g)return;
        let area=document.getElementById('choice-area'); area.innerHTML="";
        for(let i=0;i<data.g.length;i++){
            let c=data.g[i], ops=pMap[c]||[{c:'佳',m:'Excellent'},{c:'安',m:'Peace'}], orig=oDict[c]||{m:'Sound'};
            area.innerHTML+=`<div class="char-selection-block"><div>字 ${i+1}：【${c}】</div>
                <label class="radio-option"><div onclick="speak('${c}')"><input type="radio" name="char${i}" value="${c}" data-m="${orig.m}" checked> <b>${c}</b> (${orig.m})</div><div class="speaker-icon" onclick="event.stopPropagation();speak('${c}')">🔊</div></label>
                <label class="radio-option"><div onclick="speak('${ops[0].c}')"><input type="radio" name="char${i}" value="${ops[0].c}" data-m="${ops[0].m}"> <b>${ops[0].c}</b> (${ops
