<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>師大華語學園 - 新生報到</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=ZCOOL+XiaoWei&family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --ntnu-red: #8A1538; --bg-color: #FDFBF7; --text-main: #333333; --card-bg: #FFFFFF; --accent: #D4A373; --chat-emily: #E8F0FE; --chat-student: #FCE8E6; }
        body { margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-color); background-image: radial-gradient(var(--accent) 1px, transparent 1px); background-size: 20px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); }
        #game-container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 15px; box-shadow: 0 10px 30px rgba(138, 21, 56, 0.1); overflow: hidden; display: flex; flex-direction: column; min-height: 80vh; position: relative; }
        #scene-area { background: linear-gradient(135deg, var(--ntnu-red), #A32A4C); height: 160px; position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 5px solid var(--accent); }
        .campus-bg { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.2); font-size: 60px; font-weight: bold; font-family: 'Noto Serif TC', serif; letter-spacing: 5px; pointer-events: none; }
        #avatar { width: 90px; height: 90px; background-color: #FFF; border-radius: 50%; border: 4px solid var(--accent); display: flex; justify-content: center; align-items: center; font-size: 45px; transform: translateY(30px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 10; }
        #interaction-area { padding: 50px 30px 30px 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .dialogue-box { background-color: #F0F4F8; border-radius: 10px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--ntnu-red); font-size: 1.05em; line-height: 1.5; min-height: 50px; }
        .step-section { display: none; animation: fadeIn 0.5s ease; }
        .step-section.active { display: block; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #DDD; border-radius: 8px; font-size: 1em; box-sizing: border-box; }
        input[type="text"]:focus { border-color: var(--ntnu-red); outline: none; }
        button { background-color: var(--ntnu-red); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1em; cursor: pointer; transition: all 0.2s; width: 100%; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #A32A4C; }
        button:active { transform: scale(0.98); }
        .btn-secondary { background-color: #FFF; color: var(--ntnu-red); border: 2px solid var(--ntnu-red); }
        .btn-secondary:hover { background-color: #FFF0F0; }
        .btn-success { background-color: #27AE60; }
        .btn-success:hover { background-color: #219653; }
        .btn-challenge { background-color: #F39C12; margin-top: 25px; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3);}
        .btn-challenge:hover { background-color: #D68910; }
        .error-msg { color: var(--ntnu-red); display: none; margin-top: 5px; font-weight: bold; font-size: 0.9em; }

        /* 選擇與字卡區 */
        .char-selection-block { background: #FFF; border: 2px solid #EEE; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left; }
        .char-title { color: var(--ntnu-red); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #EEE; padding-bottom: 5px; }
        .radio-option { display: block; margin-bottom: 10px; cursor: pointer; padding: 8px; border-radius: 5px; transition: background 0.2s; }
        .radio-option:hover { background: #FFF0F0; }
        input[type="radio"] { margin-right: 10px; accent-color: var(--ntnu-red); transform: scale(1.2); }
        .sentence-container { margin-top: 20px; font-size: 1.2em; }
        .sentence { margin-bottom: 15px; line-height: 2; }
        .drop-slot { display: inline-block; min-width: 120px; height: 35px; border-bottom: 2px dashed #999; vertical-align: middle; text-align: center; color: var(--ntnu-red); font-weight: bold; cursor: pointer; padding: 0 10px; }
        .drop-slot.selected { background-color: #FFF0F0; border-bottom: 2px solid var(--ntnu-red); }
        .drop-slot.filled { border-bottom: 2px solid #4CAF50; color: #4CAF50; }
        .cards-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .word-card { background-color: #FFF; border: 2px solid var(--accent); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .word-card:hover { transform: translateY(-3px); border-color: var(--ntnu-red); }
        .word-card.used { opacity: 0.5; pointer-events: none; background-color: #EEE; border-color: #CCC; }

        /* 名片區 (Step 5) */
        #business-card-wrapper { background: #FFF; padding: 10px; border-radius: 10px; display: flex; justify-content: center; }
        .business-card { width: 100%; max-width: 450px; background: #FFFFFF; border: 1px solid #E0E0E0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; box-sizing: border-box; position: relative; overflow: hidden; border-left: 12px solid var(--ntnu-red); margin-bottom: 10px; text-align: left; min-height: 250px; }
        .card-decoration-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        .card-content-layer { position: relative; z-index: 2; }
        .bc-header { font-family: 'Noto Serif TC', serif; color: #666; font-size: 0.9em; letter-spacing: 2px; margin-bottom: 25px; border-bottom: 1px solid #EEE; padding-bottom: 5px; }
        .bc-name-foreign { font-size: 1.3em; color: #555; margin-bottom: 5px; }
        .bc-name-chinese { font-size: 2.8em; font-weight: bold; font-family: 'Noto Serif TC', serif; color: var(--text-main); letter-spacing: 5px; margin-bottom: 15px; }
        .bc-meaning-tag { display: inline-block; background-color: var(--ntnu-red); color: white; padding: 5px 12px; border-radius: 6px; font-size: 0.85em; font-weight: bold; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(138,21,56,0.3); }
        .seal-container { position: absolute; bottom: 25px; right: 30px; width: 85px; height: 85px; z-index: 3; }
        .teaching-section { background-color: #2C3E50; color: #FFF; padding: 20px; border-radius: 8px; text-align: left; margin-top: 15px; }
        .teaching-title { color: #F39C12; font-weight: bold; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 15px; }
        .pinyin-line { margin-bottom: 15px; line-height: 1.4; }
        .py-text { color: #AAB7B8; font-size: 0.85em; font-family: Arial, sans-serif; }
        .zh-text { font-size: 1.2em; font-weight: bold; }
        .highlight { color: #F1C40F; }

        /* 聊天室區 (Step 6) */
        .chat-container { background-color: #F8F9FA; border: 1px solid #E0E0E0; border-radius: 12px; padding: 15px; height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 1
