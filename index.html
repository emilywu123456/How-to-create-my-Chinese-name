<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>師大華語學園 - 新生報到</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --ntnu-red: #8A1538; --bg-color: #FDFBF7; --text-main: #333333; --card-bg: #FFFFFF; --accent: #D4A373; --chat-emily: #E8F0FE; --chat-student: #FCE8E6; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); overflow-x: hidden; }
        #game-container { width: 100%; max-width: 600px; background: #FFF; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; min-height: 85vh; position: relative; z-index: 10; overflow: hidden;}
        #scene-area { background: linear-gradient(135deg, var(--ntnu-red), #5c0e25); height: 160px; position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 6px solid var(--accent); }
        .campus-bg { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.1); font-size: 60px; font-weight: bold; pointer-events: none; }
        #avatar-container { width: 100px; height: 100px; background: #FFF; border-radius: 50%; border: 5px solid var(--accent); transform: translateY(35px); z-index: 10; background-color: #FCE8E6; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #interaction-area { padding: 50px 30px 30px 30px; flex-grow: 1; display: flex; flex-direction: column; background: #faf8f5;}
        .dialogue-box { background: #FFFFFF; border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 2px solid var(--ntnu-red); font-size: 1.1em; font-weight: bold; text-align: center; min-height: 50px; position: relative; line-height: 1.5; color: #444;}
        .dialogue-box::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); border-width: 0 12px 12px 12px; border-style: solid; border-color: transparent transparent var(--ntnu-red) transparent; }
        .step-section { display: none; } .step-section.active { display: block; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #DDD; border-radius: 8px; font-size: 1.1em; text-align: center;}
        button { background: var(--ntnu-red); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        .btn-secondary { background: #FFF; color: var(--ntnu-red); border: 2px solid var(--ntnu-red); }
        .char-selection-block { background: #FFF; border: 2px solid #EEE; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left; }
        .radio-option { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; padding: 10px; border: 1px solid #EEE; border-radius: 8px; background: #FAFAFA; transition: 0.2s;}
        .drop-slot { display: inline-block; min-width: 100px; border-bottom: 2px dashed #999; text-align: center; color: var(--ntnu-red); font-weight: bold; cursor: pointer; margin: 0 5px;}
        .drop-slot.filled { border-bottom: 2px solid #4CAF50; color: #4CAF50; }
        .word-card { display: inline-block; background: #FFF; border: 2px solid var(--accent); padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
        .word-card.used { opacity: 0.3; pointer-events: none; }
        .chat-container { background: #F8F9FA; border: 1px solid #E0E0E0; border-radius: 12px; padding: 15px; height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; text-align: left; }
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; clear: both; font-size: 0.95em; line-height: 1.4;}
        .chat-emily { background: var(--chat-emily); align-self: flex-start; color: #1A73E8; font-weight: bold; }
        .chat-student { background: var(--chat-student); align-self: flex-end; color: var(--ntnu-red); font-weight: bold; float: right; margin-bottom: 5px;}
        .chat-btn { background: #FFF; border: 2px solid #DDD; color: #555; text-align: left; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; width: 100%; cursor: pointer;}
        
        /* 名片樣式 */
        .business-card { width: 100%; max-width: 450px; background: #FFF; border: 1px solid #E0E0E0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; box-sizing: border-box; position: relative; overflow: hidden; border-left: 12px solid var(--ntnu-red); min-height: 250px; text-align: left;}
        .card-decoration-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        .card-content-layer { position: relative; z-index: 5; }
        .bc-header { color: #666; font-size: 0.8em; margin-bottom: 15px; border-bottom: 1px solid #EEE; padding-bottom: 10px; font-family: serif; }
        .bc-name-chinese { font-size: 2.8em; font-weight: bold; color: var(--text-main); margin-bottom: 10px; font-family: 'Noto Serif TC', serif; letter-spacing: 2px;}
        .bc-meaning-tag { display: inline-block; background: var(--ntnu-red); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.85em; font-weight: bold; }
        .seal-container { position: absolute; bottom: 25px; right: 30px; width: 85px; height: 85px; z-index: 10; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="scene-area"><div class="campus-bg">NTNU</div><div id="avatar-container">
        <svg viewBox="0 0 100 100" style="width:100%;height:100%;"><path d="M20 100 C20 70, 80 70, 80 100" fill="#8A1538" /><path d="M25 40 C15 60, 20 90, 25 100 L75 100 C80 90, 85 60, 75 40 Z" fill="#2C3E50" /><circle cx="50" cy="45" r="20" fill="#FFE0BD" /><circle cx="42" cy="45" r="2" fill="#333" /><circle cx="58" cy="45" r="2" fill="#333" /><path d="M46 52 Q50 57 54 52" stroke="#333" stroke-width="2" fill="none" /><circle cx="37" cy="49" r="3" fill="#FFB6C1" /><circle cx="63" cy="49" r="3" fill="#FFB6C1" /><path d="M70 35 C75 30, 80 35, 75 40 C80 45, 75 50, 70 45 C65 50, 60 45, 65 40 C60 35, 65 30, 70 35 Z" fill="#F1C40F" /></svg>
    </div></div>
    <div id="interaction-area">
        <div class="dialogue-box" id="main-msg">歡迎來到師大華語學園！</div>
        <div id="step-0" class="step-section active"><h2>華語文新生報到</h2><button onclick="startGame()">開始報到 Start</button></div>
        <div id="step-1" class="step-section"><label>本國名字 Your Name：</label><input type="text" id="fn-in" placeholder="e.g. Emily"><button onclick="toS2()">下一步 Next</button></div>
        <div id="step-2" class="step-section"><button class="btn-secondary" onclick="window.open('https://translate.google.com/?sl=auto&tl=zh-TW','_blank')">🔍 Google 翻譯聽發音</button><p>貼上翻譯後的中文名字：</p><input type="text" id="gn-in" placeholder="e.g. 艾蜜莉"><button onclick="toS3()">下一步 Next</button></div>
        <div id="step-3" class="step-section"><div id="choice-area"></div><button onclick="toS4()">確認名字 Confirm</button></div>
        <div id="step-4" class="step-section"><div style="text-align:left"><p>你好，我叫 <span id="slot-f" class="drop-slot" onclick="selSlot('f')">[填空]</span>。</p><p>我的中文名字是 <span id="slot-c" class="drop-slot" onclick="selSlot('c')">[填空]</span>。</p><p>意思是 <span id="slot-m" class="drop-slot" onclick="selSlot('m')">[填空]</span>。</p></div><div id="card-pool"></div></div>
        <div id="step-5" class="step-section"><div class="chat-container" id="chat-history"></div><div id="chat-opts"></div></div>
        <div id="step-6" class="step-section">
            <div id="card-wrap" class="business-card">
                <div class="card-decoration-layer" id="bc-decorations"></div>
                <div class="card-content-layer">
                    <div class="bc-header">National Taiwan Normal University<br>國立台灣師範大學</div>
                    <div id="bc-f" style="font-size:1.2em;color:#555;margin-bottom:5px;"></div>
                    <div id="bc-c" class="bc-name-chinese"></div>
                    <div id="bc-m" class="bc-meaning-tag"></div>
                </div>
                <div class="seal-container"><canvas id="seal-canvas" width="320" height="320" style="width:85px;height:85px;"></canvas></div>
            </div>
            <button style="background:#27AE60" onclick="download()">📥 下載名片 Download</button>
            <button class="btn-secondary" onclick="replaySpeech()">🔊 聽老師唸名片</button>
        </div>
    </div>
</div>

<script>
    const pMap={'艾':[{c:'愛',m:'Love'},{c:'安',m:'Peace'}],'蜜':[{c:'米',m:'Rice'},{c:'明',m:'Bright'}],'莉':[{c:'麗',m:'Beautiful'},{c:'立',m:'Stand'}],'大':[{c:'達',m:'Reach'},{c:'德',m:'Virtue'}],'衛':[{c:'偉',m:'Great'},{c:'威',m:'Power'}],'瑪':[{c:'馬',m:'Energetic'},{c:'美',m:'Fine'}],'麗':[{c:'理',m:'Reason'},{c:'莉',m:'Jasmine'}],'傑':[{c:'捷',m:'Victory'},{c:'界',m:'World'}]};
    const oDict={'艾':{m:'Mugwort'},'蜜':{m:'Honey'},'莉':{m:'Jasmine'},'大':{m:'Big'},'衛':{m:'Guard'},'瑪':{m:'Agate'},'麗':{m:'Elegant'}};
    let data={f:"",g:"",c:"",m:""}, curSl="", okC=0, chatStage=0;
    let sentences=[];

    function speak(t){
        if('speechSynthesis' in window){
            window.speechSynthesis.cancel();
            setTimeout(() => {
                let u=new SpeechSynthesisUtterance(t.replace(/👩🏻‍🏫 Emily 老師: /g,''));
                u.lang='zh-TW'; u.rate=0.9; window.speechSynthesis.speak(u);
            }, 50);
        }
    }

    function show(n){ document.querySelectorAll('.step-section').forEach(s=>s.classList.remove('active')); document.getElementById('step-'+n).classList.add('active'); }
    function startGame(){ show(1); speak("你好！我是 Emily 老師。很高興認識你，請告訴我你的本國名字是什麼？"); }
    function toS2(){ data.f=document.getElementById('fn-in').value.trim(); if(data.f){ show(2); speak("太好了，請貼上翻譯後的中文名字貼給我吧！"); } }
    
    function toS3(){
        data.g=document.getElementById('gn-in').value.trim(); if(!data.g)return;
        const area=document.getElementById('choice-area'); area.innerHTML="";
        for(let i=0;i<data.g.length;i++){
            let c=data.g[i], ops=pMap[c]||[{c:'佳',m:'Excellent'},{c:'安',m:'Peace'}], orig=oDict[c]||{m:'Sound'};
            area.innerHTML+=`<div class="char-selection-block">字 ${i+1}：【${c}】
                <label class="radio-option" onclick="speak('${c}')"><input type="radio" name="char${i}" value="${c}" data-m="${orig.m}" checked> <b>${c}</b> (${orig.m})<div style="font-size:1.2em">🔊</div></label>
                <label class="radio-option" onclick="speak('${ops[0].c}')"><input type="radio" name="char${i}" value="${ops[0].c}" data-m="${ops[0].m}"> <b>${ops[0].c}</b> (${ops[0].m})<div style="font-size:1.2em">🔊</div></label>
                <label class="radio-option" onclick="speak('${ops[1].c}')"><input type="radio" name="char${i}" value="${ops[1].c}" data-m="${ops[1].m}"> <b>${ops[1].c}</b> (${ops[1].m})<div style="font-size:1.2em">🔊</div></label></div>`;
        }
        show(3); speak("針對每一個字，聽聽看發音，挑選你最喜歡的組合！");
    }

    function toS4(){
        let n="",m=[];for(let i=0;i<data.g.length;i++){let r=document.querySelector(`input[name="char${i}"]:checked`);n+=r.value;m.push(r.getAttribute('data-m'));}
        data.c=n; data.m=m.join(", "); 
        sentences=["你好，我叫 " + data.f, "我的中文名字是 " + data.c, "它的意思是 " + data.m];
        let pool=document.getElementById('card-pool'); pool.innerHTML="";
        [{id:'f',t:data.f},{id:'c',t:data.c},{id:'m',t:data.m}].sort(()=>Math.random()-0.5).forEach(o=>{
            let b=document.createElement('div'); b.className="word-card"; b.innerText=o.t;
            b.onclick=()=>{if(!curSl)return; speak(o.t); if(o.id===curSl){document.getElementById('slot-'+curSl).innerText=o.t;document.getElementById('slot-'+curSl).classList.add('filled');b.classList.add('used');curSl="";okC++;if(okC===3)setTimeout(startChat,1000);}else{speak("不對喔");}};
            pool.appendChild(b);
        });
        show(4); speak("請點擊空格，再點選字片進行配對。");
    }

    function selSlot(t){curSl=t;document.querySelectorAll('.drop-slot').forEach(s=>s.style.background="transparent");document.getElementById('slot-'+t).style.background="#FFF0F0";}

    // ✨ 核心對話三選一邏輯 ✨
    function startChat(){ show(5); chatStage=0; renderNextTurn(); }
    
    function renderNextTurn(){
        const box=document.getElementById('chat-history'); 
        const opts=document.getElementById('chat-opts'); opts.innerHTML="";
        
        if(chatStage===0){
            box.innerHTML=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 你好！很高興認識你。</div>`; speak("你好！很高興認識你");
        } else if(chatStage===1){
            box.innerHTML+=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 你的中文名字是什麼？</div>`; speak("你的中文名字是什麼？");
        } else if(chatStage===2){
            box.innerHTML+=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 這名字真好聽！它的意思是什麼？</div>`; speak("這名字真好聽！它的意思是什麼？");
        } else {
            box.innerHTML+=`<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 太棒了！你的中文真的非常好喔！任務大成功！</div>`; speak("太棒了！你的中文真的非常好喔！任務大成功！");
            setTimeout(triggerEnd, 1500); return;
        }

        // 洗牌生成 3 個對話選項
        [0,1,2].sort(()=>Math.random()-0.5).forEach(idx => {
            let btn = document.createElement('button'); btn.className="chat-btn";
            btn.innerHTML = `<span>${sentences[idx]}</span> 🔊`;
            btn.onclick = () => {
                speak(sentences[idx]);
                if(idx === chatStage){
                    box.innerHTML += `<div class="chat-bubble chat-student">${sentences[idx]}</div>`;
                    chatStage++; setTimeout(renderNextTurn, 1000);
                } else {
                    btn.style.borderColor="red"; setTimeout(()=>btn.style.borderColor="#DDD", 500);
                }
            };
            opts.appendChild(btn);
        });
    }

    function triggerEnd(){
        new Audio('https://actions.google.com/sounds/v1/weapons/fireworks_with_whistle.ogg').play().catch(e=>{});
        show(6); document.getElementById('bc-f').innerText=data.f; document.getElementById('bc-c').innerText=data.c; document.getElementById('bc-m').innerText=data.m;
        drawSeal(); startFW(); genDecor(); 
        setTimeout(()=>speak(`你好，我叫${data.f}。我的中文名字是${data.c}。它的意思是${data.m}。`), 600);
    }

    function genDecor(){
        const l=document.getElementById('bc-decorations'), m=data.m.toLowerCase();
        const loveSvg=`<svg style="position:absolute;bottom:0;left:10px;width:150px;height:150px;" viewBox="0 0 100 100" fill="#8A1538" opacity="0.2"><path d="M50,90 c-20,-20 -45,-35 -45,-60 c0,-20 15,-30 30,-30 c10,0 15,5 15,10 c0,-5 5,-10 15,-10 c15,0 30,10 30,30 c0,25 -25,40 -45,60 Z"/></svg>`;
        const jasmineSvg=`<svg style="position:absolute;top:50px;right:0;width:150px;height:150px;" viewBox="0 0 100 100" fill="#8A1538" opacity="0.2"><path d="M50,50 c10,-20 30,-20 40,0 c10,20 -10,30 -40,10 M50,50 c20,-10 20,-30 0,-40 c-20,-10 -30,10 -10,40 Z"/></svg>`;
        const cloudSvg=`<svg style="position:absolute;top:-20px;right:-30px;width:220px;height:220px;" viewBox="0 0 100 100" fill="#8A1538" opacity="0.1"><path d="M80,30 c0,-10 -10,-15 -20,-10 c0,-15 -25,-15 -30,-5 c-10,-5 -20,0 -15,15 Z"/></svg>`;
        l.innerHTML = m.includes('love') ? loveSvg : (m.includes('jasmine') ? jasmineSvg : cloudSvg);
    }

    function startFW(){
        const c=document.createElement('canvas'); c.style.cssText="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:99999"; document.body.appendChild(c);
        const ctx=c.getContext('2d'); c.width=window.innerWidth; c.height=window.innerHeight;
        let p=[]; function cr(x,y){for(let i=0;i<40;i++)p.push({x:x,y:y,vx:(Math.random()-0.5)*15,vy:(Math.random()-0.5)*15,l:1.0,d:0.02,c:`hsl(${Math.random()*360},100%,50%)`});}
        cr(c.width/2,c.height/2); function am(){ctx.clearRect(0,0,c.width,c.height);let al=false;p.forEach(i=>{if(i.l>0){i.x+=i.vx;i.y+=i.vy;i.vy+=0.1;i.l-=i.d;ctx.fillStyle=i.c;ctx.globalAlpha=i.l;ctx.beginPath();ctx.arc(i.x,i.y,4,0,Math.PI*2);ctx.fill();al=true;}});if(al)requestAnimationFrame(am);else c.remove();} am();
    }

    function drawSeal(){
        const c=document.getElementById("seal-canvas"),ctx=c.getContext("2d"),n=data.c;
        c.width=320;c.height=320;ctx.strokeStyle="#C1121F";ctx.lineWidth=14;ctx.strokeRect(20,20,280,280);ctx.lineWidth=4;ctx.strokeRect(36,36,248,248);
        ctx.fillStyle="#C1121F";ctx.textAlign="center";ctx.textBaseline="middle";let f='"Long Cang", cursive';
        if(n.length===2){ctx.font=`bold 140px ${f}`;ctx.fillText(n[0],215,160);ctx.fillText(n[1],105,160);}
        else if(n.length===3){ctx.font=`bold 150px ${f}`;ctx.fillText(n[0],215,160);ctx.font=`bold 110px ${f}`;ctx.fillText(n[1],105,95);ctx.fillText(n[2],105,225);}
        else{ctx.font=`bold 180px ${f}`;ctx.fillText(n[0]||"",160,160);}
    }
    function replaySpeech(){ speak(`你好，我叫${data.f}。我的中文名字是${data.c}。它的意思是${data.m}。`); }
    function download(){ html2canvas(document.getElementById('card-wrap')).then(c=>{let a=document.createElement('a');a.download='Card.png';a.href=c.toDataURL();a.click();}); }
</script>
</body>
</html>
