<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>師大華語學園 - 新生報到</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=ZCOOL+XiaoWei&family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --ntnu-red: #8A1538; --bg-color: #FDFBF7; --text-main: #333333; --card-bg: #FFFFFF; --accent: #D4A373; --chat-emily: #E8F0FE; --chat-student: #FCE8E6; }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color) radial-gradient(var(--accent) 1px, transparent 1px); background-size: 20px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); overflow-x: hidden; }
        #game-container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 15px; box-shadow: 0 10px 30px rgba(138,21,56,0.1); display: flex; flex-direction: column; min-height: 85vh; position: relative; z-index: 10; overflow: hidden;}
        
        /* 頂部場景 */
        #scene-area { background: linear-gradient(135deg, var(--ntnu-red), #5c0e25); height: 180px; position: relative; display: flex; justify-content: center; align-items: flex-end; border-bottom: 6px solid var(--accent); }
        .campus-bg { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.15); font-size: 65px; font-weight: bold; font-family: 'Noto Serif TC', serif; letter-spacing: 5px; pointer-events: none; }
        
        /* 📸 真人照片頭像區 📸 */
        #avatar-container { width: 110px; height: 110px; background: #FFF; border-radius: 50%; border: 5px solid var(--accent); display: flex; justify-content: center; align-items: center; transform: translateY(40px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); z-index: 10; overflow: hidden; }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; object-position: 70% 30%; }

        /* 對話氣泡 */
        #interaction-area { padding: 60px 30px 30px 30px; flex-grow: 1; display: flex; flex-direction: column; background: #faf8f5;}
        .dialogue-box { background: #FFFFFF; border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 2px solid var(--ntnu-red); font-size: 1.1em; line-height: 1.6; min-height: 60px; position: relative; box-shadow: 0 4px 15px rgba(138,21,56,0.08); font-weight: bold; color: #444;}
        .dialogue-box::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); border-width: 0 12px 12px 12px; border-style: solid; border-color: transparent transparent var(--ntnu-red) transparent; }
        .dialogue-box::after { content: ''; position: absolute; top: -9px; left: 50%; transform: translateX(-50%); border-width: 0 10px 10px 10px; border-style: solid; border-color: transparent transparent #FFFFFF transparent; }

        .step-section { display: none; animation: fadeIn 0.4s; } .step-section.active { display: block; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #DDD; border-radius: 8px; font-size: 1em; box-sizing: border-box; }
        input[type="text"]:focus { border-color: var(--ntnu-red); outline: none; }
        button { background: var(--ntnu-red); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 1.05em; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(138,21,56,0.2);}
        button:hover { background: #A32A4C; transform: translateY(-2px); } button:active { transform: scale(0.98); }
        .btn-secondary { background: #FFF; color: var(--ntnu-red); border: 2px solid var(--ntnu-red); } .btn-secondary:hover { background: #FFF0F0; }
        .btn-success { background: #27AE60; box-shadow: 0 4px 10px rgba(39,174,96,0.2);} .btn-success:hover { background: #219653; }
        .btn-challenge { background: #F39C12; margin-top: 25px; box-shadow: 0 4px 10px rgba(243,156,18,0.3);} .btn-challenge:hover { background: #D68910; }
        .error-msg { color: var(--ntnu-red); display: none; margin-top: 5px; font-weight: bold; font-size: 0.9em; }

        /* 字義選擇與字卡 */
        .char-selection-block { background: #FFF; border: 2px solid #EEE; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .char-title { color: var(--ntnu-red); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #EEE; padding-bottom: 5px; }
        .radio-option { display: block; margin-bottom: 10px; cursor: pointer; padding: 8px; border-radius: 5px; transition: 0.2s;} .radio-option:hover { background: #FFF0F0; transform: translateX(5px);}
        .sentence-container { margin-top: 20px; font-size: 1.2em; background: #FFF; padding: 15px; border-radius: 10px; border: 1px dashed #CCC;} .sentence { margin-bottom: 15px; line-height: 2; }
        .drop-slot { display: inline-block; min-width: 120px; height: 35px; border-bottom: 2px dashed #999; vertical-align: middle; text-align: center; color: var(--ntnu-red); font-weight: bold; cursor: pointer; padding: 0 5px; transition: 0.2s;}
        .drop-slot.selected { background: #FFF0F0; border-bottom: 2px solid var(--ntnu-red); transform: scale(1.05);} .drop-slot.filled { border-bottom: 2px solid #4CAF50; color: #4CAF50; }
        .cards-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; justify-content: center;}
        .word-card { background: #FFF; border: 2px solid var(--accent); padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .word-card:hover { transform: translateY(-4px); border-color: var(--ntnu-red); box-shadow: 0 4px 8px rgba(138,21,56,0.2);} .word-card.used { opacity: 0.5; pointer-events: none; background: #EEE; border-color: #CCC;}

        /* 名片區 */
        #business-card-wrapper { background: #FFF; padding: 15px; border-radius: 12px; display: flex; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
        .business-card { width: 100%; max-width: 450px; background: #FFF; border: 1px solid #E0E0E0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; box-sizing: border-box; position: relative; overflow: hidden; border-left: 12px solid var(--ntnu-red); min-height: 250px; }
        .card-decoration-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        .card-content-layer { position: relative; z-index: 2; }
        .bc-header { font-family: 'Noto Serif TC', serif; color: #666; font-size: 0.9em; letter-spacing: 2px; margin-bottom: 25px; border-bottom: 1px solid #EEE; padding-bottom: 5px; }
        .bc-name-foreign { font-size: 1.3em; color: #555; margin-bottom: 5px; }
        .bc-name-chinese { font-size: 2.8em; font-weight: bold; font-family: 'Noto Serif TC', serif; color: var(--text-main); letter-spacing: 5px; margin-bottom: 15px; }
        .bc-meaning-tag { display: inline-block; background: var(--ntnu-red); color: white; padding: 5px 12px; border-radius: 6px; font-size: 0.85em; font-weight: bold; margin-bottom: 20px; }
        .seal-container { position: absolute; bottom: 25px; right: 30px; width: 85px; height: 85px; z-index: 3; }
        
        .teaching-section { background: #2C3E50; color: #FFF; padding: 20px; border-radius: 12px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .teaching-title { color: #F39C12; font-weight: bold; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 15px; font-size: 1.1em;}
        .pinyin-line { margin-bottom: 15px; line-height: 1.4; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;} .py-text { color: #AAB7B8; font-size: 0.9em; letter-spacing: 1px;} .zh-text { font-size: 1.25em; font-weight: bold; margin-top: 2px;} .highlight { color: #F1C40F; }

        /* 聊天室區 */
        .chat-container { background: #F8F9FA; border: 1px solid #E0E0E0; border-radius: 12px; padding: 15px; height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);}
        .chat-bubble { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 1.1em; line-height: 1.4; animation: fadeIn 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .chat-emily { background: var(--chat-emily); align-self: flex-start; border-bottom-left-radius: 0; color: #1A73E8; font-weight: bold; }
        .chat-student { background: var(--chat-student); align-self: flex-end; border-bottom-right-radius: 0; color: var(--ntnu-red); font-weight: bold; }
        .chat-options { display: flex; flex-direction: column; gap: 10px; }
        .chat-btn { background: #FFF; border: 2px solid #DDD; color: #555; text-align: left; padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.02); margin-top: 0;} .chat-btn:hover { border-color: var(--ntnu-red); background: #FFF0F0; transform: translateY(-2px);}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } } .shake { animation: shake 0.3s ease; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="scene-area">
        <div class="campus-bg">NTNU</div>
        <div id="avatar-container">
            <img id="avatar-img" src="emily.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Emily&background=8A1538&color=fff&size=150'" alt="Emily 老師">
        </div>
    </div>
    
    <div id="interaction-area">
        <div class="dialogue-box" id="dialogue-text"></div>

        <div id="step-0" class="step-section active">
            <h2 style="color: var(--ntnu-red); text-align: center;">國立台灣師範大學<br>華語文新生報到</h2>
            <button onclick="startGame()">開始報到 Start</button>
        </div>

        <div id="step-1" class="step-section">
            <label>你的本國名字 (Your Name)：</label>
            <input type="text" id="input-foreign-name" placeholder="e.g. Emily, David">
            <div id="error-msg-1" class="error-msg">⚠️ 請輸入你的名字喔！</div>
            <button onclick="submitForeignName()">下一步 Next</button>
        </div>

        <div id="step-2" class="step-section">
            <button class="btn-secondary" onclick="window.open('https://translate.google.com/?sl=auto&tl=zh-TW', '_blank')">🔍 去 Google 翻譯聽發音</button><br><br>
            <label>貼上 Google 翻譯給你的名字：</label>
            <input type="text" id="input-google-name" placeholder="e.g. 艾蜜莉, 大衛">
            <div id="error-msg-2" class="error-msg">⚠️ 請把查到的中文名字貼上來喔！</div>
            <button onclick="submitGoogleName()">為名字選擇意義 Next</button>
        </div>

        <div id="step-3" class="step-section">
            <div id="suggestions-area"></div>
            <button onclick="submitChosenName()">確認我的名字 Confirm</button>
        </div>

        <div id="step-4" class="step-section">
            <div class="sentence-container">
                <div class="sentence">你好，我叫 <span class="drop-slot" data-type="foreign" onclick="selectSlot(this)">[ 點擊填空 ]</span>。</div>
                <div class="sentence">我的中文名字是 <span class="drop-slot" data-type="chinese" onclick="selectSlot(this)">[ 點擊填空 ]</span>。</div>
                <div class="sentence">它的意思是 <span class="drop-slot" data-type="meaning" onclick="selectSlot(this)">[ 點擊填空 ]</span>。</div>
            </div>
            <div class="cards-container" id="cards-area"></div>
        </div>

        <div id="step-5" class="step-section">
            <div id="business-card-wrapper">
                <div class="business-card" id="final-business-card">
                    <div class="card-decoration-layer" id="bc-decorations"></div>
                    <div class="card-content-layer">
                        <div class="bc-header">National Taiwan Normal University 國立台灣師範大學</div>
                        <div class="bc-name-foreign" id="bc-foreign"></div>
                        <div class="bc-name-chinese" id="bc-chinese"></div>
                        <div class="bc-meaning-tag" id="bc-meaning"></div>
                    </div>
                    <div class="seal-container"><canvas id="seal-canvas" width="320" height="320" style="width:85px; height:85px;"></canvas></div>
                </div>
            </div>
            
            <button class="btn-success" onclick="downloadCard()">📥 下載專屬名片 Download</button>
            <button class="btn-secondary" onclick="replayComputerSpeech()" style="margin-top: 15px;">🔊 再聽一次電腦朗讀 Read Again</button>
            
            <div class="teaching-section" id="teaching-area">
                <div class="teaching-title">📝 發音 Review</div>
                <div class="pinyin-line"><div class="py-text">Nǐ hǎo, wǒ jiào <span id="teach-py-foreign"></span>.</div><div class="zh-text">你好，我叫 <span class="highlight" id="teach-zh-foreign"></span>。</div></div>
                <div class="pinyin-line"><div class="py-text">Wǒ de zhōng wén míng zì shì <span id="teach-py-chinese" class="highlight"></span>.</div><div class="zh-text">我的中文名字是 <span class="highlight" id="teach-zh-chinese"></span>。</div></div>
                <div class="pinyin-line"><div class="py-text">Tā de yì sī shì <span id="teach-py-meaning"></span>.</div><div class="zh-text">它的意思是 <span class="highlight" id="teach-zh-meaning"></span>。</div></div>
            </div>
            
            <button class="btn-challenge" onclick="startChatPractice()">💬 加碼挑戰：與 Emily 老師對話</button>
        </div>

        <div id="step-6" class="step-section">
            <div class="chat-container" id="chat-history"></div>
            <div class="chat-options" id="chat-options-area"></div>
            <button id="btn-final-success" class="btn-success" style="display: none; margin-top: 20px;" onclick="location.reload()">🌟 任務大成功！點此重新開始</button>
        </div>

    </div>
</div>

<script>
    // --- 字典庫 ---
    const originalCharMap = {
        '艾': {m:'Mugwort/Artemisia', p:'ài'}, '蜜': {m:'Honey', p:'mì'}, '莉': {m:'Jasmine', p:'lì'},
        '大': {m:'Big', p:'dà'}, '衛': {m:'Guard', p:'wèi'}, '瑪': {m:'Agate', p:'mǎ'},
        '麗': {m:'Beautiful', p:'lì'}, '傑': {m:'Outstanding', p:'jié'}, '克': {m:'Overcome', p:'kè'},
        '斯': {m:'This/Thus', p:'sī'}, '丁': {m:'Fourth/Man', p:'dīng'}, '湯': {m:'Soup', p:'tāng'},
        '姆': {m:'Nanny', p:'mǔ'}, '約': {m:'Agreement', p:'yuē'}, '翰': {m:'Brush/Pen', p:'hàn'}
    };

    const phoneticMap = {
        '艾': [{c:'愛',m:'Love',p:'ài'},{c:'安',m:'Peace',p:'ān'}], '蜜': [{c:'米',m:'Rice',p:'mǐ'},{c:'明',m:'Bright',p:'míng'}],
        '莉': [{c:'麗',m:'Beautiful',p:'lì'},{c:'立',m:'Independent',p:'lì'}], '大': [{c:'達',m:'Reach',p:'dá'},{c:'德',m:'Virtue',p:'dé'}],
        '衛': [{c:'偉',m:'Great',p:'wěi'},{c:'威',m:'Power',p:'wēi'}], '瑪': [{c:'馬',m:'Energetic',p:'mǎ'},{c:'滿',m:'Full',p:'mǎn'}],
        '麗': [{c:'莉',m:'Jasmine',p:'lì'},{c:'理',m:'Reason',p:'lǐ'}], '傑': [{c:'捷',m:'Victory',p:'jié'},{c:'結',m:'Unite',p:'jié'}],
        '克': [{c:'可',m:'Lovely',p:'kě'},{c:'客',m:'Guest',p:'kè'}], '斯': [{c:'思',m:'Think',p:'sī'},{c:'詩',m:'Poetry',p:'shī'}],
        '丁': [{c:'頂',m:'Top',p:'dǐng'},{c:'定',m:'Stable',p:'dìng'}], '湯': [{c:'唐',m:'Tang',p:'táng'},{c:'天',m:'Sky',p:'tiān'}],
        '姆': [{c:'慕',m:'Admire',p:'mù'},{c:'沐',m:'Grace',p:'mù'}], '約': [{c:'躍',m:'Leap',p:'yuè'},{c:'月',m:'Moon',p:'yuè'}],
        '翰': [{c:'漢',m:'Han',p:'hàn'},{c:'浩',m:'Vast',p:'hào'}]
    };
    const fallbacks = [[{c:'佳',m:'Excellent',p:'jiā'},{c:'宇',m:'Universe',p:'yǔ'}]];
    const decorSvgMap = {
        'fallback': `<svg style="position:absolute; top:-30px; right:-50px; width:280px; height:280px;" viewBox="0 0 100 60" fill="#8A1538"><path d="M80,30 c0,-10 -10,-15 -20,-10 c0,-15 -25,-15 -30,-5 c-10,-5 -20,0 -15,15 c-10,10 0,20 15,15 c5,10 20,10 25,0 c10,5 20,0 20,-15 Z"/><path d="M30,50 c0,-8 -8,-12 -16,-8 c0,-12 -20,-12 -24,-4 c-8,-4 -16,0 -12,12 c-8,8 0,16 12,12 c4,8 16,8 20,0 c8,4 16,0 16,-12 Z"/></svg>`,
        'love': `<svg style="position:absolute; bottom:0px; left:10px; width:180px; height:180px;" viewBox="0 0 100 100" fill="#8A1538"><path d="M50,90 c-20,-20 -45,-35 -45,-60 c0,-20 15,-30 30,-30 c10,0 15,5 15,10 c0,-5 5,-10 15,-10 c15,0 30,10 30,30 c0,25 -25,40 -45,60 Z" /></svg>`,
        'heart': `<svg style="position:absolute; bottom:0px; left:10px; width:180px; height:180px;" viewBox="0 0 100 100" fill="#8A1538"><path d="M50,90 c-20,-20 -45,-35 -45,-60 c0,-20 15,-30 30,-30 c10,0 15,5 15,10 c0,-5 5,-10 15,-10 c15,0 30,10 30,30 c0,25 -25,40 -45,60 Z" /></svg>`,
        'peace': `<svg style="position:absolute; top:80px; left:-20px; width:220px; height:110px;" viewBox="0 0 100 50" stroke="#8A1538" stroke-width="4" fill="none"><path d="M10,25 c20,-15 60,-15 80,0 M10,30 c20,-10 60,-10 80,0 M20,20 L80,35 M20,35 L80,20" /></svg>`,
        'bright': `<svg style="position:absolute; top:10px; right:80px; width:180px; height:180px;" viewBox="0 0 100 100" stroke="#8A1538" stroke-width="5" fill="none"><circle cx="50" cy="50" r="15"/><path d="M50,10 L50,25 M50,75 L50,90 M10,50 L25,50 M75,50 L90,50 M22,22 L32,32 M68,68 L78,78 M22,78 L32,68 M68,22 L78,32" /></svg>`,
        'star': `<svg style="position:absolute; top:10px; right:80px; width:160px; height:160px;" viewBox="0 0 100 100" fill="#8A1538"><path d="M50,10 L62,35 L90,38 L70,58 L75,85 L50,72 L25,85 L30,58 L10,38 L38,35 Z" /></svg>`,
        'nature': `<svg style="position:absolute; bottom:-30px; left:-10px; width:220px; height:220px;" viewBox="0 0 100 100" stroke="#8A1538" stroke-width="4" fill="none"><path d="M20,80 C30,60 50,70 70,50 C80,40 85,20 80,10 M30,90 C40,75 55,80 65,70"/><ellipse cx="80" cy="15" rx="5" ry="10" transform="rotate(-30 80 15)" fill="#8A1538" stroke="none"/></svg>`,
        'flower': `<svg style="position:absolute; top:50px; right:0px; width:180px; height:180px;" viewBox="0 0 100 100" fill="#8A1538"><path d="M50,50 c10,-20 30,-20 40,0 c10,20 -10,30 -40,10 M50,50 c20,-10 20,-30 0,-40 c-20,-10 -30,10 -10,40 M50,50 c-10,-20 -30,-20 -40,0 c-10,20 10,30 40,10 M50,50 c-20,-10 -20,-30 0,-40 c20,-10 30,10 10,40 Z" /></svg>`
    };

    let userData = { foreignName: "", googleName: "", chineseName: "", meaning: "", pinyin: "" };
    let currentSlot = null, correctCount = 0, typeWriterTimeout, chatStage = 0, sentences = [];

    // --- 語音朗讀輔助函數 ---
    function speakText(text, rate = 0.85) { 
        if ('speechSynthesis' in window) { 
            window.speechSynthesis.cancel(); 
            let cleanText = text.replace(/👩🏻‍🏫 Emily: /g, '').replace(/[^\u4e00-\u9fa5a-zA-Z0-9，。！？、]/g, '');
            let u = new SpeechSynthesisUtterance(cleanText); 
            u.lang = 'zh-TW'; 
            u.rate = rate; 
            window.speechSynthesis.speak(u); 
        } 
    }

    function emilySpeaks(text, elementId = "dialogue-text") {
        typeWriter(text, elementId);
        speakText(text);
    }

    function typeWriter(text, elementId, speed = 40) {
        clearTimeout(typeWriterTimeout); document.getElementById(elementId).innerHTML = ""; let i = 0;
        function type() { if (i < text.length) { document.getElementById(elementId).innerHTML += text.charAt(i); i++; typeWriterTimeout = setTimeout(type, speed); } } type();
    }
    
    function showStep(stepNumber) { document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active')); document.getElementById(`step-${stepNumber}`).classList.add('active'); }

    // --- Step 1 ~ 4 流程 ---
    function startGame() {
