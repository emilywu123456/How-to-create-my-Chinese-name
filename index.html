        #interaction-area { padding: 45px 30px 30px 30px; flex-grow: 1; display: flex; flex-direction: column; background: #faf8f5;}
        .dialogue-box { background: #FFFFFF; border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 2px solid var(--ntnu-red); font-size: 1.1em; font-weight: bold; text-align: center; min-height: 50px; position: relative; line-height: 1.5; color: #444; box-shadow: 0 4px 10px rgba(138,21,56,0.05);}
        .dialogue-box::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); border-width: 0 12px 12px 12px; border-style: solid; border-color: transparent transparent var(--ntnu-red) transparent; }
        .step-section { display: none; animation: fadeIn 0.4s ease-out; } 
        .step-section.active { display: block; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #DDD; border-radius: 8px; font-size: 1.1em; text-align: center; box-sizing: border-box; transition: 0.2s;}
        input[type="text"]:focus { border-color: var(--ntnu-red); outline: none; }
        button { background: var(--ntnu-red); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 10px rgba(138,21,56,0.2);}
        button:hover:not(:disabled) { transform: translateY(-2px); background: #A32A4C;}
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none;}
        .btn-secondary { background: #FFF; color: var(--ntnu-red); border: 2px solid var(--ntnu-red); box-shadow: none;}
        .char-selection-block { background: #FFF; border: 2px solid #EEE; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left; }
        .radio-option { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; padding: 10px; border: 1px solid #EEE; border-radius: 8px; background: #FAFAFA; transition: 0.2s;}
        .drop-slot { display: inline-block; min-width: 90px; border-bottom: 2px dashed #999; text-align: center; color: var(--ntnu-red); font-weight: bold; cursor: pointer; margin: 0 5px; padding-bottom: 2px;}
        .drop-slot.filled { border-bottom: 2px solid #4CAF50; color: #4CAF50; }
        .word-card { display: inline-block; background: #FFF; border: 2px solid var(--accent); padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;}
        .word-card.used { opacity: 0.3; pointer-events: none; border-color: #CCC; }
        .chat-container { background: #F8F9FA; border: 1px solid #E0E0E0; border-radius: 12px; padding: 15px; height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; text-align: left; scroll-behavior: smooth;}
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; clear: both; font-size: 0.95em; line-height: 1.4; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .chat-emily { background: var(--chat-emily); align-self: flex-start; color: #1A73E8; font-weight: bold; }
        .chat-student { background: var(--chat-student); align-self: flex-end; color: var(--ntnu-red); font-weight: bold; margin-bottom: 5px;}
        .chat-btn { background: #FFF; border: 2px solid #DDD; color: #555; text-align: left; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; width: 100%; cursor: pointer; transition: 0.2s; box-shadow: none;}
        .business-card { width: 100%; max-width: 450px; background: #FFF; border: 1px solid #E0E0E0; box-shadow: 0 8px 25px rgba(0,0,0,0.1); padding: 30px; box-sizing: border-box; position: relative; overflow: hidden; border-left: 12px solid var(--ntnu-red); min-height: 250px; text-align: left; border-radius: 8px;}
        .card-decor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        .card-content { position: relative; z-index: 5; }
        .bc-header { color: #666; font-size: 0.8em; margin-bottom: 15px; border-bottom: 1px solid #EEE; padding-bottom: 10px; font-family: 'Noto Serif TC', serif; letter-spacing: 1px;}

        </div>

        </div>

            </div>
            <button style="background:#27AE60" onclick="Core.downloadCard()">📥 下載名片 Download</button>

    },
    startGame: function() { this.show(1); this.speak("你好！我是 Emily 老師。很高興認識你，請告訴我你的本國名字是什麼？"); },
    toS2: function() { this.data.f = document.getElementById('fn-in').value.trim(); if(this.data.f){ this.show(2); this.speak("太好了，請貼上翻譯後的中文名字貼給我吧！"); } },
    toS3: function() {
        this.data.g = document.getElementById('gn-in').value.trim(); if(!this.data.g) return;
        const area = document.getElementById('choice-area'); area.innerHTML = "";
        for(let i=0; i<this.data.g.length; i++) {
            let char = this.data.g[i]; let meaning = Dict[char] ? Dict[char].m : "";
            let ops = Dict[char] ? Dict[char].ops : [{c:Decoys[i%Decoys.length].c, m:Decoys[i%Decoys.length].m}, {c:Decoys[(i+1)%Decoys.length].c, m:Decoys[(i+1)%Decoys.length].m}];
            let finalOpts = [{ c: char, m: meaning, isCorrect: true }, { c: ops[0].c, m: ops[0].m, isCorrect: false }, { c: ops[1].c, m: ops[1].m, isCorrect: false }].sort(() => Math.random() - 0.5);
            let html = `<div class="char-selection-block"><div>字 ${i+1}：【${char}】</div>`;
            finalOpts.forEach(opt => {
                let check = opt.isCorrect ? "checked" : ""; let mDisp = opt.m ? `(${opt.m})` : "";
                html += `<label class="radio-option" onclick="Core.speak('${opt.c}')"><input type="radio" name="char${i}" value="${opt.c}" data-m="${opt.m}" ${check}> <b>${opt.c}</b> ${mDisp} 🔊</label>`;
            });
            area.innerHTML += html + `</div>`;
        }
        this.show(3); this.speak("聽聽看發音，挑選最正確的組合！");
    },
    toS4: function() {
        let n = "", mArr = [];
        for(let i=0; i<this.data.g.length; i++){
            let r = document.querySelector(`input[name="char${i}"]:checked`);
            n += r.value; let m = r.getAttribute('data-m'); if(m) mArr.push(m);
        }
        this.data.c = n; this.data.m = mArr.join(", ") || " ";
        this.sentences = ["你好，我叫 " + this.data.f, "我的中文名字是 " + this.data.c, "它的意思是 " + this.data.m];
        const pool = document.getElementById('card-pool'); pool.innerHTML = "";
        let cards = [{id:'f', t:this.data.f}, {id:'c', t:this.data.c}, {id:'m', t:this.data.m}].sort(() => Math.random() - 0.5);
        cards.forEach(obj => {
            let btn = document.createElement('div'); btn.className = "word-card"; btn.innerText = obj.t;
            btn.onclick = () => {
                if(!this.curSlot) return; this.speak(obj.t);
                if(obj.id === this.curSlot) {
                    document.getElementById('slot-'+this.curSlot).innerText = obj.t;
                    document.getElementById('slot-'+this.curSlot).classList.add('filled');
                    btn.classList.add('used'); this.curSlot = ""; this.matchedCount++;
                    if(this.matchedCount === 3) setTimeout(() => this.startChat(), 1500);
                } else this.speak("不對喔");
            };
            pool.appendChild(btn);
        });
        this.show(4); this.speak("請點擊空格，再點選下方的字卡進行配對。");
    },
    selSlot: function(t) { this.curSlot = t; document.querySelectorAll('.drop-slot').forEach(s => s.style.background = "transparent"); document.getElementById('slot-'+t).style.background = "#FFF0F0"; },
    startChat: function() { this.show(5); this.chatStage = 0; this.availableOpts = [0, 1, 2]; this.renderChatTurn(); },
    renderChatTurn: function() {
        const box = document.getElementById('chat-history'); const optsArea = document.getElementById('chat-opts-area'); optsArea.innerHTML = "";
        let tText = ["你好！很高興認識你。", "你的中文名字是什麼？", "這名字真好聽！它的意思是什麼？"][this.chatStage];
        if(this.chatStage < 3) {
            box.innerHTML += `<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: ${tText}</div>`; box.scrollTop = box.scrollHeight; this.speak(tText);
            let shuf = [...this.availableOpts].sort(() => Math.random() - 0.5);
            shuf.forEach(idx => {
                let btn = document.createElement('button'); btn.className = "chat-btn"; btn.innerHTML = `<span>${this.sentences[idx]}</span> 🔊`;
                btn.onclick = () => {
                    document.querySelectorAll('.chat-btn').forEach(b => b.disabled = true);
                    if(idx === this.chatStage) {
                        box.innerHTML += `<div class="chat-bubble chat-student">${this.sentences[idx]}</div>`;
                        box.scrollTop = box.scrollHeight; this.availableOpts = this.availableOpts.filter(o => o !== idx);
                        this.chatStage++; this.speak(this.sentences[idx], () => this.renderChatTurn());
                    } else {
                        btn.style.borderColor = "red"; setTimeout(() => btn.style.borderColor = "#DDD", 500);
                        this.speak(this.sentences[idx], () => document.querySelectorAll('.chat-btn').forEach(b => b.disabled = false));
                    }
                };
                optsArea.appendChild(btn);
            });
        } else {
            box.innerHTML += `<div class="chat-bubble chat-emily">👩🏻‍🏫 Emily: 太棒了！任務大成功！</div>`; box.scrollTop = box.scrollHeight;
            this.speak("太棒了！你的中文真的非常好喔！任務大成功！", () => this.triggerEnd());
        }
    },
    triggerEnd: function() {
        new Audio('https://actions.google.com/sounds/v1/weapons/fireworks_with_whistle.ogg').play().catch(e=>{});
        this.show(6); document.getElementById('bc-f').innerText = this.data.f; document.getElementById('bc-c').innerText = this.data.c; document.getElementById('bc-m').innerText = this.data.m;
        this.drawSeal(); this.startFW(); this.genDecor();
        setTimeout(() => this.speak(`你好，我叫${this.data.f}。我的中文名字是${this.data.c}。它的意思是${this.data.m}。`), 500);
    },
    genDecor: function() {
        let layer = document.getElementById('bc-decor'); let m = this.data.m.toLowerCase();
        let svg = `<svg style="position:absolute;top:-20px;right:-30px;width:220px;height:220px;" viewBox="0 0 100 100" fill="#8A1538" opacity="0.1"><path d="M80,30 c0,-10 -10,-15 -20,-10 c0,-15 -25,-15 -30,-5 c-10,-5 -20,0 -15,15 Z"/></svg>`;
        if(m.includes('love')) svg = `<svg style="position:absolute;bottom:0;left:10px;width:150px;height:150px;" viewBox="0 0 100 100" fill="#8A1538" opacity="0.15"><path d="M50,90 c-20,-20 -45,-35 -45,-60 c0,-20 15,-30 30,-30 c10,0 15,5 15,10 c0,-5 5,-10 15,-10 c15,0 30,10 30,30 c0,25 -25,40 -45,60 Z"/></svg>`;
        if(m.includes('jasmine') || m.includes('beautiful')) svg = `<svg style="position:absolute;top:50px;right:0;width:150px;height:150px;" viewBox="0 0 100 100" fill="#8A1538" opacity="0.15"><path d="M50,50 c10,-20 30,-20 40,0 c10,20 -10,30 -40,10 M50,50 c20,-10 20,-30 0,-40 c-20,-10 -30,10 -10,40 Z"/></svg>`;
        layer.innerHTML = svg;
    },
    startFW: function() {
        let c = document.createElement('canvas'); c.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:99999"; document.body.appendChild(c);
        let ctx = c.getContext('2d'); c.width = window.innerWidth; c.height = window.innerHeight;
        let p = []; for(let i=0;i<40;i++) p.push({x:c.width/2, y:c.height/2, vx:(Math.random()-0.5)*18, vy:(Math.random()-0.5)*18, l:1.0, d:0.02, c:`hsl(${Math.random()*360},100%,60%)`});
        function anim() { ctx.clearRect(0,0,c.width,c.height); let active = false; p.forEach(i => { if(i.l > 0){ i.x+=i.vx; i.y+=i.vy; i.vy+=0.15; i.l-=i.d; ctx.fillStyle=i.c; ctx.globalAlpha=i.l; ctx.beginPath(); ctx.arc(i.x,i.y,4,0,Math.PI*2); ctx.fill(); active=true; } }); if(active) requestAnimationFrame(anim); else c.remove(); } anim();
    },
    drawSeal: function() {
        let c = document.getElementById("seal-canvas"); let ctx = c.getContext("2d"), n = this.data.c;
        c.width = 320; c.height = 320; ctx.strokeStyle = "#C1121F"; ctx.lineWidth = 14; ctx.strokeRect(20,20,280,280); ctx.lineWidth = 4; ctx.strokeRect(36,36,248,248); ctx.fillStyle = "#C1121F"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; let f = '"Long Cang", cursive';
        if (n.length === 2) { ctx.font = "bold 140px " + f; ctx.fillText(n[0], 215, 160); ctx.fillText(n[1], 105, 160); }
        else if (n.length === 3) { ctx.font = "bold 150px " + f; ctx.fillText(n[0], 215, 160); ctx.font = "bold 110px " + f; ctx.fillText(n[1], 105, 95); ctx.fillText(n[2], 105, 225); }
        else if (n.length >= 4) { ctx.font = "bold 110px " + f; ctx.fillText(n[0], 215, 95); ctx.fillText(n[1], 215, 225); ctx.fillText(n[2], 105, 95); ctx.fillText(n[3], 105, 225); }
        else { ctx.font = "bold 180px " + f; ctx.fillText(n[0] || "印", 160, 160); }
    },
    downloadCard: function() { html2canvas(document.getElementById('card-wrap')).then(c => { let a = document.createElement('a'); a.download = 'MyNTNUCard.png'; a.href = c.toDataURL(); a.click(); }); },
    replayEnd: function() { this.speak(`你好，我叫${this.data.f}。我的中文名字是${this.data.c}。它的意思是${this.data.m}。`); }
};
</script>
